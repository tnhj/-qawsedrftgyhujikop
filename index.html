<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字順唱ゲーム</title>

<style>
body{
    font-family: sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#numberDisplay{
    font-size:48px;
    font-weight:bold;
    margin:30px 0;
    letter-spacing:8px;
    min-height:70px;
}

input{
    font-size:24px;
    padding:10px;
    width:250px;
    text-align:center;
}

button{
    font-size:18px;
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
}

.correct{
    color:green;
    font-weight:bold;
}

.incorrect{
    color:red;
    font-weight:bold;
}

table{
    margin:auto;
    border-collapse:collapse;
    margin-top:20px;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
}
</style>
</head>
<body>

<div class="container">

<h1>数字順唱ゲーム</h1>

<p>7桁の数字が3秒間表示されます。表示順に入力してください。</p>

<h2 id="questionInfo">問題 1 / 10</h2>

<div id="numberDisplay"></div>

<div id="answerArea" style="display:none;">
    <input type="text" id="answerInput" maxlength="7">
    <br>
    <button onclick="submitAnswer()">回答</button>
</div>

<div id="feedback"></div>

<button id="startBtn" onclick="startGame()">開始</button>

<div id="result"></div>

</div>

<script>

const TOTAL_QUESTIONS = 10;
const DIGITS = 7;
const DISPLAY_TIME = 3000;

let currentQuestion = 0;
let currentNumber = "";
let correctCount = 0;

let startTime = 0;
let totalAnswerTime = 0;

let history = [];

function generateNumber(){
    let num = "";
    for(let i=0;i<DIGITS;i++){
        num += Math.floor(Math.random()*10);
    }
    return num;
}

function startGame(){

    document.getElementById("startBtn").style.display="none";
    nextQuestion();
}

function nextQuestion(){

    document.getElementById("feedback").innerHTML="";
    document.getElementById("answerArea").style.display="none";
    document.getElementById("answerInput").value="";

    if(currentQuestion >= TOTAL_QUESTIONS){
        finishGame();
        return;
    }

    document.getElementById("questionInfo").textContent =
        `問題 ${currentQuestion+1} / ${TOTAL_QUESTIONS}`;

    currentNumber = generateNumber();

    document.getElementById("numberDisplay").textContent =
        currentNumber.split("").join(" ");

    setTimeout(() => {

        document.getElementById("numberDisplay").textContent = "● ● ● ● ● ● ●";

        document.getElementById("answerArea").style.display="block";

        startTime = performance.now();

        document.getElementById("answerInput").focus();

    }, DISPLAY_TIME);
}

function submitAnswer(){

    const answer =
        document.getElementById("answerInput").value.trim();

    if(answer.length !== DIGITS){
        alert("7桁入力してください。");
        return;
    }

    const elapsed =
        (performance.now() - startTime) / 1000;

    totalAnswerTime += elapsed;

    let feedback = "";

    if(answer === currentNumber){

        correctCount++;

        feedback =
        `<p class="correct">
        正解！<br>
        解答時間: ${elapsed.toFixed(2)} 秒
        </p>`;

        history.push({
            q: currentQuestion + 1,
            result: "正解",
            answerTime: elapsed.toFixed(2)
        });

    }else{

        feedback =
        `<p class="incorrect">
        不正解<br>
        あなたの回答: ${answer}<br>
        正答: ${currentNumber}<br>
        解答時間: ${elapsed.toFixed(2)} 秒
        </p>`;

        history.push({
            q: currentQuestion + 1,
            result: "不正解",
            answerTime: elapsed.toFixed(2)
        });
    }

    document.getElementById("feedback").innerHTML = feedback;

    currentQuestion++;

    setTimeout(nextQuestion, 2500);
}

function finishGame(){

    document.getElementById("questionInfo").textContent =
        "テスト終了";

    document.getElementById("numberDisplay").style.display="none";
    document.getElementById("answerArea").style.display="none";
    document.getElementById("feedback").style.display="none";

    const accuracy =
        (correctCount / TOTAL_QUESTIONS * 100).toFixed(1);

    const averageTime =
        (totalAnswerTime / TOTAL_QUESTIONS).toFixed(2);

    let table = `
    <table>
        <tr>
            <th>問題</th>
            <th>結果</th>
            <th>解答時間(秒)</th>
        </tr>
    `;

    history.forEach(item=>{
        table += `
        <tr>
            <td>${item.q}</td>
            <td>${item.result}</td>
            <td>${item.answerTime}</td>
        </tr>
        `;
    });

    table += "</table>";

    document.getElementById("result").innerHTML = `
        <h2>結果</h2>
        <p><strong>正解数：</strong>${correctCount} / ${TOTAL_QUESTIONS}</p>
        <p><strong>正答率：</strong>${accuracy}%</p>
        <p><strong>平均解答時間：</strong>${averageTime}秒</p>
        ${table}
    `;
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(document.getElementById("answerArea").style.display==="block"){
            submitAnswer();
        }
    }
});

</script>

</body>
</html>
