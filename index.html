<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAIS風 記憶力テスト</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
max-width:800px;
margin:auto;
padding:20px;
}
.card{
background:#1e1e1e;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}
button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
input{
width:100%;
padding:10px;
font-size:20px;
margin-top:10px;
}
#number{
font-size:42px;
text-align:center;
letter-spacing:6px;
min-height:60px;
}
.good{color:#4caf50}
.bad{color:#ff5252}
</style>

</head>
<body>

<h1>🧠 WAIS風 記憶力テスト</h1>

<div class="card">
<div id="status">STARTを押してください</div>
<div id="number"></div>

<button onclick="startTest()">START</button>

<div id="answerArea" style="display:none">
<input id="answer" autocomplete="off">
<button onclick="submitAnswer()">回答</button>
</div>
</div>

<div class="card">
<h2>現在の成績</h2>
<div>桁数: <span id="digits">6</span></div>
<div>正答数: <span id="correct">0</span></div>
<div>誤答数: <span id="wrong">0</span></div>
<div>平均回答時間: <span id="avg">0</span>秒</div>
</div>

<div class="card">
<h2>🏆 ベスト記録</h2>
<div id="best"></div>
</div>

<div class="card">
<h2>📋 履歴</h2>
<div id="history"></div>
</div>

<script>

let digit=6;
let questionCount=0;
let missAtLevel=0;

let current="";
let startTime=0;

let correct=0;
let wrong=0;

let answerTimes=[];

function randDigits(n){
let s="";
for(let i=0;i<n;i++){
s+=Math.floor(Math.random()*10);
}
return s;
}

function startTest(){
nextQuestion();
}

function nextQuestion(){

current=randDigits(digit);

document.getElementById("digits").textContent=digit;

document.getElementById("answerArea").style.display="none";
document.getElementById("status").textContent=
digit+"桁を覚えてください";

document.getElementById("number").textContent=current;

setTimeout(()=>{

document.getElementById("number").textContent="";

document.getElementById("answerArea").style.display="block";

document.getElementById("answer").value="";
document.getElementById("answer").focus();

startTime=Date.now();

},3000);

}

function submitAnswer(){

let ans=document.getElementById("answer").value.trim();

let time=(Date.now()-startTime)/1000;

answerTimes.push(time);

if(ans===current){

correct++;

questionCount++;

if(questionCount>=2){

digit++;
questionCount=0;
missAtLevel=0;

}

document.getElementById("status").innerHTML=
"<span class='good'>正解！</span>";

}else{

wrong++;
missAtLevel++;

document.getElementById("status").innerHTML=
"<span class='bad'>不正解</span>";

if(missAtLevel>=2){

finishTest();
return;
}

}

updateStats();

setTimeout(nextQuestion,1200);

}

function updateStats(){

document.getElementById("correct").textContent=correct;
document.getElementById("wrong").textContent=wrong;

let avg=0;

if(answerTimes.length){
avg=
answerTimes.reduce((a,b)=>a+b,0)
/answerTimes.length;
}

document.getElementById("avg").textContent=
avg.toFixed(2);

}

function rank(d){

if(d>=12)return "S";
if(d>=10)return "A";
if(d>=8)return "B";
if(d>=6)return "C";
return "D";

}

function finishTest(){

let avg=
answerTimes.reduce((a,b)=>a+b,0)
/answerTimes.length;

let result={
date:new Date().toLocaleString(),
maxDigit:digit,
correct,
wrong,
avg:avg.toFixed(2),
rank:rank(digit)
};

let history=
JSON.parse(localStorage.getItem("memoryHistory")||"[]");

history.unshift(result);

localStorage.setItem(
"memoryHistory",
JSON.stringify(history)
);

document.getElementById("status").innerHTML=
"終了！ ランク "+result.rank+
" / 最高桁数 "+result.maxDigit;

document.getElementById("answerArea").style.display="none";

loadHistory();

}

function loadHistory(){

let history=
JSON.parse(localStorage.getItem("memoryHistory")||"[]");

if(history.length===0)return;

let best=
history.reduce((a,b)=>
a.maxDigit>b.maxDigit?a:b);

document.getElementById("best").innerHTML=
`
最高桁数: ${best.maxDigit}<br>
ランク: ${best.rank}<br>
平均回答時間: ${best.avg}秒
`;

let html="";

history.slice(0,10).forEach(h=>{

html+=`
<hr>
${h.date}<br>
最高桁数: ${h.maxDigit}<br>
ランク: ${h.rank}<br>
正答: ${h.correct}<br>
誤答: ${h.wrong}<br>
平均回答時間: ${h.avg}秒
`;

});

document.getElementById("history").innerHTML=html;

}

loadHistory();

</script>

</body>
</html>
